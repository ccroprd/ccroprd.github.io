<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Guapuã Sys</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // Se o usuário já estiver logado, joga ele pro sistema automaticamente
    if (sessionStorage.getItem('guapua_session')) {
      window.location.href = 'guapuasys.html';
    }
  </script>
</head>
<body>
  <div id="loadingOverlay" class="hidden"><div class="spinner"></div></div>

  <div class="login-wrapper">
    <div class="login-box">
      <h1 class="logo">Guapuã Sys</h1>
      <p>Acesso Restrito ao Sistema</p>
      <form id="loginForm">
        <div class="input-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" required placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="Digite sua senha">
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
