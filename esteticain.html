<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cícero Hof • Obrigado!</title>

  <style>
    body {
      margin: 0;
      padding: 30px 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f8f8;
      color: #222;
      text-align: center;
    }

    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      margin: 20px auto;
      display: block;
      border: 4px solid #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 1.8em;
      margin: 10px 0 20px;
      font-weight: 600;
      color: #333;
    }

    .text-block {
      max-width: 85%;
      margin: 0 auto 35px;
      font-size: 1.15em;
      line-height: 1.6em;
      color: #333;
    }

    .cta {
      font-size: 1.4em;
      margin-bottom: 18px;
      font-weight: bold;
      color: #111;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 10px;
    }

    .icons a img {
      width: 70px;
      height: 70px;
      transition: transform 0.3s;
    }

    .icons a img:hover {
      transform: scale(1.12);
    }

    @media (min-width: 768px) {
      .text-block {
        max-width: 55%;
        font-size: 1.2em;
      }

      h1 {
        font-size: 2.1em;
      }

      .profile-img {
        width: 200px;
        height: 200px;
      }
    }
  </style>
</head>

<body>

  <img src="tks.png" alt="Cícero Hof" class="profile-img">

  <h1>@cicero.hof</h1>

  <div class="text-block">
    <p>Muito obrigado por confiar no meu atendimento e na entrega do serviço prestado.</p>

    <p>Fico à sua disposição para qualquer necessidade, seja suporte com produtos, orientação ou o que mais puder ajudar.</p>

    <p>Conte sempre comigo! 🤝</p>
  </div>

  <p class="cta">👉 Me chama</p>

  <div class="icons">
    <a href="https://www.instagram.com/cicero.hof/" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
    </a>
    <a href="https://wa.me/5511937783240" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
    </a>
  </div>

</body>
</html>
